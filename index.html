<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS Liquida — Catálogo Junio 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --rojo: #AB2328;
  --gris: #707372;
  --oscuro: #575756;
  --borde: #e2e0e0;
  --fondo: #f3f3f2;
  --blanco: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: var(--fondo); color: var(--oscuro); }

/* HEADER */
header {
  background: var(--oscuro);
  padding: 24px 36px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.h-title h1 { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: .06em; text-transform: uppercase; }
.h-title p  { font-size: 10px; color: #aaa; font-weight: 500; margin-top: 3px; letter-spacing: .08em; text-transform: uppercase; }
.h-badge { background: var(--rojo); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 6px 16px; border-radius: 2px; }

/* TOOLBAR */
.toolbar {
  background: var(--blanco); border-bottom: 1px solid var(--borde);
  padding: 12px 36px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.toolbar input, .toolbar select {
  font-family: 'Montserrat', sans-serif; font-size: 12px;
  border: 1px solid var(--borde); border-radius: 3px; padding: 7px 12px;
  outline: none; color: var(--oscuro); background: var(--blanco);
}
.toolbar input { width: 240px; }
.toolbar input:focus, .toolbar select:focus { border-color: var(--gris); }
.t-count { font-size: 11px; color: var(--gris); margin-left: auto; font-weight: 500; }

/* GRID */
main { padding: 28px 36px; max-width: 1440px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

/* CARD — horizontal layout: imagen izq, contenido der */
.card {
  background: var(--blanco); border: 1px solid var(--borde); border-radius: 4px;
  overflow: hidden; transition: box-shadow .15s;
  display: flex; flex-direction: row;
  min-height: 160px;
}
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); }

/* IMAGEN — fija 160×160, nunca crece */
.card-img-wrap {
  width: 160px; min-width: 160px; max-width: 160px;
  background: #f7f7f6; border-right: 1px solid var(--borde);
  flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-img-wrap .ph {
  width: 100%; height: 100%; min-height: 160px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  background: #f2f1f0;
}
.card-img-wrap .ph svg { opacity: .15; }
.card-img-wrap .ph span { font-size: 8px; color: var(--gris); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; text-align: center; padding: 0 8px; }

/* LADO DERECHO */
.card-right {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
}
.card-brand { font-size: 8px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #fff; background: var(--gris); padding: 3px 10px; display: block; flex-shrink: 0; }
.card-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--oscuro); padding: 8px 12px 6px; border-bottom: 1px solid #f0efee; flex-shrink: 0; line-height: 1.3; }

/* VARIANTS — scroll si hay muchas */
.variants {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: grid; grid-template-columns: 1fr;
  max-height: 280px;
  /* scrollbar sutil */
  scrollbar-width: thin; scrollbar-color: #ddd transparent;
}
.variants::-webkit-scrollbar { width: 4px; }
.variants::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* 2 columnas si hay 8+ variantes */
.card.cols2 .variants { grid-template-columns: 1fr 1fr; }

.variant {
  padding: 6px 12px; border-bottom: 1px solid #f5f4f3; border-right: 1px solid #f5f4f3;
  display: grid; grid-template-columns: 1fr auto; gap: 1px 6px; align-items: center;
}
.variant:last-child { border-bottom: none; }

.v-code { font-size: 8px; font-weight: 600; letter-spacing: .08em; color: var(--gris); text-transform: uppercase; grid-column: 1; }
.v-desc { font-size: 10px; font-weight: 500; color: var(--oscuro); line-height: 1.35; grid-column: 1; }
.v-prices { grid-column: 2; grid-row: 1 / span 2; text-align: right; display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 0; }
.p-old { font-size: 9px; font-weight: 600; text-decoration: line-through; color: var(--rojo); white-space: nowrap; }
.p-new { font-size: 13px; font-weight: 700; color: var(--oscuro); white-space: nowrap; }

footer { text-align: center; padding: 24px; font-size: 10px; color: var(--gris); letter-spacing: .05em; border-top: 1px solid var(--borde); margin-top: 36px; font-weight: 500; }

@media (max-width: 700px) {
  header, .toolbar, main { padding-left: 14px; padding-right: 14px; }
  .grid { grid-template-columns: 1fr; }
  .card-img-wrap { width: 120px; min-width: 120px; }
  .card.cols2 .variants { grid-template-columns: 1fr; }
}
</style>
</head>

function makePH(brand) {
  return `<div class="ph"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="4" y="8" width="40" height="32" rx="3" stroke="#575756" stroke-width="2.5"/><circle cx="16" cy="19" r="4" stroke="#575756" stroke-width="2"/><path d="M4 34l10-9 8 7 6-5 16 11" stroke="#575756" stroke-width="2" stroke-linejoin="round"/></svg><span>${brand}</span></div>`;
}

function renderCard(p) {
  const imgHTML = p.img
    ? `<img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.parentNode.innerHTML=makePH('${p.brand}')">`
    : makePH(p.brand);

  const variants = p.v.map(v => `
    <div class="variant">
      <div class="v-code">${v.code}</div>
      <div class="v-desc">${v.desc}</div>
      <div class="v-prices"><span class="p-old">${v.op}</span><span class="p-new">${v.np}</span></div>
    </div>`).join('');

  const colClass = p.v.length >= 8 ? ' cols2' : '';
  const srchStr = (p.name + ' ' + p.brand + ' ' + p.v.map(v=>v.code+' '+v.desc).join(' ')).toLowerCase();
  return `<div class="card${colClass}" data-g="${p.g}" data-s="${srchStr}">
    <div class="card-img-wrap">${imgHTML}</div>
    <div class="card-right">
      <span class="card-brand">${p.brand}</span>
      <div class="card-name">${p.name}</div>
      <div class="variants">${variants}</div>
    </div>
  </div>`;
}

function populateMarcas() {
  const sel = document.getElementById('mrc');
  const ms = [...new Set(P.map(p=>p.brand))].sort();
  ms.forEach(m => { const o = document.createElement('option'); o.value=m.toLowerCase(); o.textContent=m; sel.appendChild(o); });
}

function render() {
  const q = document.getElementById('srch').value.toLowerCase().trim();
  const m = document.getElementById('mrc').value;
  const filtered = P.filter(p => {
    const bm = !m || p.brand.toLowerCase() === m;
    const srch = (p.name + ' ' + p.brand + ' ' + p.v.map(v=>v.code+' '+v.desc).join(' ')).toLowerCase();
    const bq = !q || srch.includes(q);
    return bm && bq;
  });
  document.getElementById('cat').innerHTML = filtered.map(renderCard).join('');
  document.getElementById('cnt').textContent = filtered.length + ' producto' + (filtered.length !== 1 ? 's' : '');
}

populateMarcas();
render();
</script>
